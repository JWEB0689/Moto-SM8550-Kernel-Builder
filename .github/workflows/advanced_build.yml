         📦 *Build Information:*
         • Kernel: \`Linux ${{ env.KERNEL_VERSION }}\`
         • Android: \`13-16\`
         • Branch: \`${{ github.event.inputs.kernelBranch }}\`
         • Device: \`Redmi Note 12/13 4G. Pad SE\`
    
         ⚙️ *Configuration:*
         • LTO: \`${{ github.event.inputs.LTOOptimizations }}\`
