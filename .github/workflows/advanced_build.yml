         • Build Type: \`${{ github.event.inputs.buildKSU }}\`${KSU_TEXT}
         • SUSFS: \`Enabled (GKI A13-5.15)\`
         • Local Version: \`${{ github.event.inputs.localVersion }}\`
         • Build Tools: \`${{ github.event.inputs.buildToolchains }}\`
      
         🕐 *Failed at:* $(date '+%Y-%m-%d %H:%M:%S UTC')
    
         🔍 Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
      
         curl -s -X POST \
           -d chat_id=${{ secrets.TELEGRAM_USER_ID }} \
           -d text="$FAILURE_MSG" \
           -d parse_mode="Markdown" \
           "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"
         fi
